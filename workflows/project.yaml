# Spec 006 — CRE Workflows
# Target: Base (Base Sepolia testnet, Base mainnet)
# See mandinga/specs/006-automation/quickstart.md
#
# Usage: cre workflow simulate <path> --target base-sepolia
#   or:  CRE_TARGET=base-sepolia cre workflow simulate <path>

base-sepolia:
  rpcs:
    - chain-name: ethereum-testnet-sepolia-base-1
      url: https://base-sepolia-rpc.publicnode.com

base-mainnet:
  rpcs:
    - chain-name: ethereum-mainnet-base-1
      url: https://mainnet.base.org
